name: Roblox Crawler

on:
  schedule:
    - cron: "0 * * * *"   # hourly instead of every 2h - each run is now much faster (API-based, no browser)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: roblox-crawler
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run crawler
        run: node crawler.js
        # crawler.js commits its own checkpoints periodically as it runs,
        # so a cancelled/timed-out job still keeps whatever progress it made.

      - name: Final commit (safety net)
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "auto update" || echo "no changes"
          git push || echo "nothing to push"
