<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Roblox Archival Index</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f14;
  color: white;
}

header {
  padding: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  background: #151521;
  position: sticky;
  top: 0;
}

input, select, button {
  padding: 8px;
  border-radius: 6px;
  border: none;
}

button {
  cursor: pointer;
  background: #2d6cdf;
  color: white;
}

button:hover {
  background: #1f4fb3;
}

#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
  padding: 15px;
}

.card {
  background: #1a1a25;
  border-radius: 10px;
  padding: 12px;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
  background: #222236;
}

.square .card {
  height: 180px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.title {
  font-weight: bold;
}

.meta {
  font-size: 12px;
  opacity: 0.7;
}

.play {
  width: 40px;
  height: 40px;
  cursor: pointer;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header>
  <input id="search" placeholder="Search games..." />

  <button onclick="setLayout('grid')">Grid</button>
  <button onclick="setLayout('square')">Square</button>

  <label>
    <input type="checkbox" id="showInvalid" checked />
    Invalid
  </label>

  <label>
    <input type="checkbox" id="showUnrated" checked />
    Unrated
  </label>

  <label>
    <input type="checkbox" id="showUnavailable" checked />
    Unavailable
  </label>

  <button onclick="load()">Reload</button>
</header>

<div id="grid"></div>

<script>
let layout = "grid";
let games = [];

function setLayout(type) {
  layout = type;
  document.getElementById("grid").className = type === "square" ? "square" : "";
}

// classify entries
function classify(title) {
  const t = title.toLowerCase();

  if (t.includes("unavailable")) return "unavailable";
  if (t.includes("unrated")) return "unrated";
  if (!title || t === "roblox") return "invalid";

  return "valid";
}

function shouldShow(type) {
  if (type === "invalid") return document.getElementById("showInvalid").checked;
  if (type === "unrated") return document.getElementById("showUnrated").checked;
  if (type === "unavailable") return document.getElementById("showUnavailable").checked;
  return true;
}

function render() {
  const grid = document.getElementById("grid");
  const search = document.getElementById("search").value.toLowerCase();

  grid.innerHTML = "";

  games.forEach(g => {
    const [title, id] = g.split("|").map(x => x.trim());
    const type = classify(title);

    if (!shouldShow(type)) return;
    if (!title.toLowerCase().includes(search)) return;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${title}</div>
      <div class="meta">ID: ${id} • ${type}</div>
      <img class="play"
        src="https://github.com/Crustav0IndexTeam/Old-Roblox-Archival-Project/blob/main/play%20button.png?raw=true"
        onclick="window.open('https://www.roblox.com/games/${id}', '_blank')"
      />
    `;

    grid.appendChild(card);
  });
}

async function load() {
  const res = await fetch("games.txt?_=" + Date.now());
  const text = await res.text();

  games = text.split("\n").filter(Boolean);
  render();
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("showInvalid").addEventListener("change", render);
document.getElementById("showUnrated").addEventListener("change", render);
document.getElementById("showUnavailable").addEventListener("change", render);

load();
</script>

</body>
</html>
