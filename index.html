<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Roblox Archive Index</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #eaeaea;
}

/* HEADER */
header {
  padding: 15px;
  background: #151515;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

h1 {
  margin: 0;
  font-size: 20px;
}

/* CONTROLS */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

input, select, button {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

/* GRID / LIST */
#list.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  padding: 10px;
}

#list.list {
  display: block;
  padding: 10px;
}

/* ITEM CARD */
.item {
  background: #1c1c1c;
  border-radius: 8px;
  padding: 10px;
  position: relative;
  overflow: hidden;
}

.title {
  font-weight: bold;
  margin-bottom: 5px;
}

.meta {
  font-size: 12px;
  opacity: 0.7;
}

/* PLAY BUTTON (FIXED STRETCH ISSUE) */
.play-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding: 6px 10px;
  background: #2a2a2a;
  border-radius: 6px;
  text-decoration: none;
  color: #4ea1ff;
}

.play-btn img {
  width: 18px;
  height: 18px;
  object-fit: contain; /* FIXES STRETCHING */
}

/* STATUS COLORS */
.VALID { border-left: 4px solid #2ecc71; }
.DELETED { border-left: 4px solid #e74c3c; }
.UNAVAILABLE { border-left: 4px solid #f39c12; }
.UNRATED { border-left: 4px solid #9b59b6; }
.INVALID { border-left: 4px solid #7f8c8d; }

</style>
</head>

<body>

<header>
  <h1>🕹 Roblox Archive Index</h1>

  <div class="controls">
    <input id="search" placeholder="Search..." />

    <select id="filter">
      <option value="ALL">All</option>
      <option value="VALID">Valid</option>
      <option value="UNRATED">Unrated</option>
      <option value="UNAVAILABLE">Unavailable</option>
      <option value="DELETED">Deleted</option>
      <option value="INVALID">Invalid</option>
    </select>

    <button onclick="setGrid()">Grid</button>
    <button onclick="setList()">List</button>
  </div>
</header>

<div id="list" class="grid"></div>

<script>
let games = [];

fetch("games.txt")
  .then(res => res.text())
  .then(text => {
    games = text
      .split("\n")
      .filter(Boolean)
      .map(line => {
        const parts = line.split("|").map(x => x.trim());

        return {
          type: parts[0],
          title: parts[1] || "",
          id: parts[2] || parts[1] // fallback if older format
        };
      });

    render();
  });

function getLink(g) {
  if (!g.id || g.type !== "VALID") return null;
  return `https://www.roblox.com/games/${g.id}`;
}

function render() {
  const list = document.getElementById("list");
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  list.innerHTML = "";

  games
    .filter(g => {
      if (filter !== "ALL" && g.type !== filter) return false;
      if (search && !(g.title.toLowerCase().includes(search) || g.id.includes(search))) return false;
      return true;
    })
    .forEach(g => {
      const div = document.createElement("div");
      div.className = `item ${g.type}`;

      const link = getLink(g);

      div.innerHTML = `
        <div class="title">${g.title || "Unknown"}</div>
        <div class="meta">ID: ${g.id}</div>
        <div class="meta">Status: ${g.type}</div>

        ${
          link
            ? `
              <a class="play-btn" href="${link}" target="_blank">
                <img src="https://github.com/Crustav0IndexTeam/Old-Roblox-Archival-Project/blob/main/play%20button.png?raw=true">
                Play
              </a>
            `
            : `<div class="meta">No playable link</div>`
        }
      `;

      list.appendChild(div);
    });
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("filter").addEventListener("change", render);

function setGrid() {
  document.getElementById("list").className = "grid";
}

function setList() {
  document.getElementById("list").className = "list";
}
</script>

</body>
</html>
