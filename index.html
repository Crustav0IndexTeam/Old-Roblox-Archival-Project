<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Roblox Archive Index</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

header {
  padding: 20px;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

input, select, button {
  padding: 8px;
  border-radius: 6px;
  border: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  padding: 20px;
}

.card {
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
}

.badge {
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 4px;
  display: inline-block;
}

.valid { background: green; }
.deleted { background: red; }
.unrated { background: orange; }
.invalid { background: gray; }

.play {
  display: inline-block;
  margin-top: 8px;
}

.play img {
  width: 120px;
  height: auto;
  display: block;
}
</style>
</head>

<body>

<header>
<h1>🕹 Roblox Archive</h1>

<div class="controls">
<input id="search" placeholder="Search..." />

<select id="filter">
  <option value="all">All</option>
  <option value="valid">Valid</option>
  <option value="deleted">Deleted</option>
  <option value="unrated">Unrated</option>
  <option value="invalid">Invalid</option>
</select>

<select id="year">
  <option value="all">All Years</option>
  <option value="2013">2013</option>
  <option value="2012">2012</option>
  <option value="2011">2011</option>
  <option value="2010">2010</option>
  <option value="2009">2009</option>
  <option value="2008">2008</option>
  <option value="2007">2007</option>
</select>

</div>
</header>

<div id="list" class="grid"></div>

<script>
let games = [];

fetch("games.txt")
  .then(r => r.text())
  .then(text => {
    games = text.split("\n").filter(Boolean).map(line => {
      const parts = line.split("|");
      return {
        status: parts[0],
        title: parts[1],
        id: parts[2],
        year: parts[3]?.replace("YEAR:", "")
      };
    });
    render(games);
  });

function render(data) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(g => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div><b>${g.title || "Unknown"}</b></div>
      <div class="badge ${g.status}">${g.status}</div>
      <div>Year: ${g.year || "?"}</div>

      <a class="play" href="https://www.roblox.com/games/${g.id}" target="_blank">
        <img src="https://github.com/Crustav0IndexTeam/Old-Roblox-Archival-Project/blob/main/play%20button.png?raw=true">
      </a>
    `;

    list.appendChild(div);
  });
}

function applyFilters() {
  const q = document.getElementById("search").value.toLowerCase();
  const f = document.getElementById("filter").value;
  const y = document.getElementById("year").value;

  const filtered = games.filter(g => {
    return (
      (f === "all" || g.status === f) &&
      (y === "all" || g.year === y) &&
      (!q || g.title?.toLowerCase().includes(q))
    );
  });

  render(filtered);
}

document.querySelectorAll("input, select").forEach(el => {
  el.addEventListener("input", applyFilters);
});
</script>

</body>
</html>
